name: daily-snapshot

on:
  schedule:
    # 14:00 UTC = 10:00 AM ET. Adjust to taste.
    - cron: '0 14 * * *'
  workflow_dispatch: {}  # allow manual triggering from the Actions tab

permissions:
  contents: write  # so we can commit predictions.csv + DB back to the repo

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install claude CLI (for auto-research)
        run: npm install -g @anthropic-ai/claude-code

      - name: Install copytrader
        run: python -m pip install -e .

      - name: Snapshot with auto-research (subscription auth)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          BANKROLL_USD: '1000'
          KELLY_FRACTION: '0.25'
          MAX_BET_PCT: '0.05'
          DAILY_EXPOSURE_CAP: '0.20'
          MAX_DAYS_TO_RESOLUTION: '90'
        run: |
          python -m copytrader.cli snapshot --notify

      - name: Resolve any paper trades whose markets closed
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          python -m copytrader.cli resolve

      - name: Export CSV for weekly tracking
        run: |
          python -m copytrader.cli export-csv --out data/predictions.csv

      - name: Commit results back to repo
        run: |
          git config user.name "copytrader-bot"
          git config user.email "bot@copytrader.local"
          git add data/predictions.csv data/copytrader.db || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "daily: snapshot $(date -u +%Y-%m-%d)"
          # Rebase onto remote in case main moved while we were running
          # (handles concurrent manual triggers + scheduled runs). Retry once.
          for attempt in 1 2 3; do
            git pull --rebase origin main || true
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed, retrying..."
            sleep 5
          done
          echo "All push attempts failed"
          exit 1
